<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Little Webapp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      color: #fff;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      background: linear-gradient(90deg, #f9ca24, #f0932b, #eb4d4b, #6ab04c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    #quote-box {
      font-style: italic;
      color: #a8d8ea;
      font-size: 0.95rem;
      max-width: 500px;
      margin: 0 auto;
      min-height: 2.4em;
      transition: opacity 0.4s;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }

    /* --- Toolbar --- */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 20px;
      width: 100%;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-group label {
      font-size: 0.8rem;
      color: #ccc;
      white-space: nowrap;
    }

    /* Color swatches */
    .palette {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }

    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: #fff; transform: scale(1.25); }

    /* Brush size */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #f9ca24;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Tool buttons */
    .btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: rgba(255,255,255,0.22); }
    .btn:active { transform: scale(0.96); }
    .btn.active-tool { background: rgba(249, 202, 36, 0.3); border-color: #f9ca24; }

    /* --- Canvas --- */
    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.1);
      touch-action: none;
    }

    #canvas {
      display: block;
      cursor: crosshair;
      background: #fff;
    }

    /* --- Stats bar --- */
    .stats {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      display: flex;
      gap: 20px;
    }

    /* --- Confetti overlay --- */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* Sparkle button */
    #sparkle-btn { background: rgba(235, 77, 75, 0.25); border-color: #eb4d4b; }
    #sparkle-btn:hover { background: rgba(235, 77, 75, 0.45); }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <header>
    <h1>Happy Little Webapp ☁️</h1>
    <p id="quote-box">"We don't make mistakes — we just have happy little accidents."</p>
  </header>

  <div class="app-container">
    <!-- Toolbar -->
    <div class="toolbar">
      <!-- Palette -->
      <div class="tool-group">
        <label>Color</label>
        <div class="palette" id="palette"></div>
        <input type="color" id="custom-color" title="Custom color"
               style="width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;background:none;padding:0;" />
      </div>

      <!-- Brush size -->
      <div class="tool-group">
        <label>Size</label>
        <input type="range" id="brush-size" min="2" max="60" value="10" />
        <span id="size-label" style="font-size:0.8rem;color:#ccc;width:24px;text-align:right;">10</span>
      </div>

      <!-- Tools -->
      <div class="tool-group">
        <button class="btn active-tool" id="btn-brush" onclick="setTool('brush')">✏️ Brush</button>
        <button class="btn" id="btn-fill" onclick="setTool('fill')">🪣 Fill</button>
        <button class="btn" id="btn-eraser" onclick="setTool('eraser')">🧹 Eraser</button>
      </div>

      <!-- Actions -->
      <div class="tool-group">
        <button class="btn" onclick="undo()">↩ Undo</button>
        <button class="btn" onclick="clearCanvas()">🗑 Clear</button>
        <button class="btn" onclick="saveImage()">💾 Save</button>
        <button class="btn" id="sparkle-btn" onclick="celebrate()">✨ Celebrate!</button>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>

    <div class="stats">
      <span id="stat-strokes">Strokes: 0</span>
      <span id="stat-tool">Tool: Brush</span>
      <span id="stat-coords">x: –, y: –</span>
    </div>
  </div>

  <script>
    /* ===== Quotes ===== */
    const quotes = [
      "We don't make mistakes — we just have happy little accidents.",
      "There's nothing wrong with having a tree as a friend.",
      "Let's build us a happy little cloud that floats around and have fun.",
      "Talent is a pursued interest. Anything you practice, you can do.",
      "In painting, you have unlimited power — you have the ability to move mountains.",
      "I can paint a happy little sky right here.",
      "Every day is a good day when you paint.",
      "Just go out and talk to a tree. Make friends with it.",
      "Clouds are very, very free.",
      "We want happy paintings. Happy paintings. If you want sad things, watch the news.",
    ];

    let qIdx = 0;
    const quoteBox = document.getElementById('quote-box');
    function cycleQuote() {
      quoteBox.style.opacity = 0;
      setTimeout(() => {
        qIdx = (qIdx + 1) % quotes.length;
        quoteBox.textContent = `"${quotes[qIdx]}"`;
        quoteBox.style.opacity = 1;
      }, 400);
    }
    setInterval(cycleQuote, 6000);

    /* ===== Palette ===== */
    const colors = [
      '#ffffff','#000000','#eb4d4b','#f9ca24','#f0932b',
      '#6ab04c','#22a6b3','#4834d4','#be2edd','#badc58',
      '#7ed6df','#e55039','#2c3e50','#95a5a6','#d4ac0d',
    ];
    let currentColor = '#000000';

    const paletteEl = document.getElementById('palette');
    colors.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'swatch' + (c === currentColor ? ' active' : '');
      sw.style.background = c;
      sw.title = c;
      sw.onclick = () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        currentColor = c;
        if (currentTool === 'eraser') setTool('brush');
      };
      paletteEl.appendChild(sw);
    });

    const customColor = document.getElementById('custom-color');
    customColor.addEventListener('input', e => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      currentColor = e.target.value;
      if (currentTool === 'eraser') setTool('brush');
    });

    /* ===== Canvas setup ===== */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resizeCanvas() {
      const maxW = Math.min(window.innerWidth - 32, 820);
      W = maxW;
      H = Math.round(maxW * 9 / 16);
      // Save current drawing
      const img = canvas.toDataURL();
      canvas.width = W;
      canvas.height = H;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);
      const image = new Image();
      image.onload = () => ctx.drawImage(image, 0, 0, W, H);
      image.src = img;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    /* ===== Tools ===== */
    let currentTool = 'brush';
    const brushSizeEl = document.getElementById('brush-size');
    const sizeLabelEl = document.getElementById('size-label');
    const statTool    = document.getElementById('stat-tool');
    const statStrokes = document.getElementById('stat-strokes');
    const statCoords  = document.getElementById('stat-coords');

    brushSizeEl.addEventListener('input', () => {
      sizeLabelEl.textContent = brushSizeEl.value;
    });

    function setTool(t) {
      currentTool = t;
      document.querySelectorAll('.btn[id^="btn-"]').forEach(b => b.classList.remove('active-tool'));
      document.getElementById('btn-' + t).classList.add('active-tool');
      statTool.textContent = 'Tool: ' + t.charAt(0).toUpperCase() + t.slice(1);
    }

    /* ===== Undo stack ===== */
    const undoStack = [];
    function saveState() {
      if (undoStack.length > 30) undoStack.shift();
      undoStack.push(canvas.toDataURL());
    }

    function undo() {
      if (!undoStack.length) return;
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(img, 0, 0);
      };
      img.src = undoStack.pop();
    }

    /* ===== Drawing ===== */
    let painting = false;
    let lastX = 0, lastY = 0;
    let strokeCount = 0;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * (canvas.width / rect.width),
        y: (src.clientY - rect.top)  * (canvas.height / rect.height),
      };
    }

    function startDraw(e) {
      e.preventDefault();
      const { x, y } = getPos(e);

      if (currentTool === 'fill') {
        saveState();
        floodFill(Math.round(x), Math.round(y), currentColor);
        return;
      }

      saveState();
      painting = true;
      lastX = x; lastY = y;

      // Draw dot on click
      ctx.beginPath();
      ctx.arc(x, y, getBrushRadius() / 2, 0, Math.PI * 2);
      ctx.fillStyle = drawColor();
      ctx.fill();
    }

    function draw(e) {
      e.preventDefault();
      const { x, y } = getPos(e);
      statCoords.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;

      if (!painting) return;
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.strokeStyle = drawColor();
      ctx.lineWidth = getBrushRadius();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      lastX = x; lastY = y;
    }

    function stopDraw() {
      if (painting) {
        painting = false;
        strokeCount++;
        statStrokes.textContent = `Strokes: ${strokeCount}`;
      }
    }

    function getBrushRadius() {
      return currentTool === 'eraser' ? parseInt(brushSizeEl.value) * 2 : parseInt(brushSizeEl.value);
    }

    function drawColor() {
      return currentTool === 'eraser' ? '#ffffff' : currentColor;
    }

    canvas.addEventListener('mousedown',  startDraw);
    canvas.addEventListener('mousemove',  draw);
    canvas.addEventListener('mouseup',    stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove',  draw,      { passive: false });
    canvas.addEventListener('touchend',   stopDraw);

    /* ===== Flood fill (BFS) ===== */
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r, g, b, 255];
    }

    function colorMatch(data, idx, target) {
      return data[idx]   === target[0] &&
             data[idx+1] === target[1] &&
             data[idx+2] === target[2] &&
             data[idx+3] === target[3];
    }

    function floodFill(startX, startY, fillHex) {
      const imgData = ctx.getImageData(0, 0, W, H);
      const data = imgData.data;
      const fill = hexToRgb(fillHex);
      const startIdx = (startY * W + startX) * 4;
      const target = [data[startIdx], data[startIdx+1], data[startIdx+2], data[startIdx+3]];

      if (colorMatch(data, startIdx, fill)) return;

      const stack = [[startX, startY]];
      while (stack.length) {
        const [x, y] = stack.pop();
        if (x < 0 || x >= W || y < 0 || y >= H) continue;
        const idx = (y * W + x) * 4;
        if (!colorMatch(data, idx, target)) continue;
        data[idx]   = fill[0];
        data[idx+1] = fill[1];
        data[idx+2] = fill[2];
        data[idx+3] = fill[3];
        stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
      }
      ctx.putImageData(imgData, 0, 0);
    }

    /* ===== Clear ===== */
    function clearCanvas() {
      saveState();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);
      strokeCount = 0;
      statStrokes.textContent = 'Strokes: 0';
    }

    /* ===== Save ===== */
    function saveImage() {
      const link = document.createElement('a');
      link.download = 'happy-little-painting.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    /* ===== Confetti Celebrate ===== */
    const confCanvas = document.getElementById('confetti-canvas');
    const cCtx = confCanvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnim = null;

    function celebrate() {
      confCanvas.width  = window.innerWidth;
      confCanvas.height = window.innerHeight;

      confettiParticles = Array.from({length: 160}, () => ({
        x: Math.random() * confCanvas.width,
        y: Math.random() * -confCanvas.height,
        r: Math.random() * 8 + 4,
        d: Math.random() * 160 + 80,
        color: colors[Math.floor(Math.random() * colors.length)],
        tilt: Math.random() * 10 - 10,
        tiltAngle: 0,
        tiltSpeed: Math.random() * 0.1 + 0.05,
        speed: Math.random() * 3 + 2,
      }));

      if (confettiAnim) cancelAnimationFrame(confettiAnim);
      let frames = 0;

      function animate() {
        if (frames++ > 200) {
          cCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
          return;
        }
        cCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
        confettiParticles.forEach(p => {
          p.tiltAngle += p.tiltSpeed;
          p.y += p.speed;
          p.tilt = Math.sin(p.tiltAngle) * 15;
          if (p.y > confCanvas.height) { p.y = -20; p.x = Math.random() * confCanvas.width; }

          cCtx.beginPath();
          cCtx.lineWidth = p.r;
          cCtx.strokeStyle = p.color;
          cCtx.moveTo(p.x + p.tilt + p.r / 4, p.y);
          cCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 4);
          cCtx.stroke();
        });
        confettiAnim = requestAnimationFrame(animate);
      }
      animate();
      cycleQuote();
    }
  </script>
</body>
</html>
